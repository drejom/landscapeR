url: https://lab.omeally.com/landscapeR

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: landscapeR
  description: Multi-layer omic state-transition analysis

navbar:
  structure:
    left: [intro, reference, articles]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/drejom/landscapeR

articles:
  - title: Development log
    navbar: Development log
    contents:
      - development-log

reference:
  - title: Container
    desc: Core data structure
    contents:
      - StateTransitionData
      - StateTransitionData-class
      - validate_boundary
      - migrate
  - title: Stage 0 — Synthetic controls
    contents:
      - synthetic_control
      - control_ladder
      - synthetic_potential_control
      - potential_recovery_benchmark
  - title: Stage 1 — Decomposition
    contents:
      - decompose
  - title: Stage 2 — Dynamics
    contents:
      - estimate_dynamics
  - title: Projection
    contents:
      - project_into
  - title: Plots
    contents:
      - plot_spectrum
      - plot_decomposition
      - plot_components
      - plot_potential
  - title: Registry
    contents:
      - register_strategy
      - get_strategy
      - list_strategies
  - title: Provenance
    contents:
      - record_provenance
      - ProvenanceStep-class
  - title: Pipeline runner
    contents:
      - run_pipeline
      - setup_rng
      - PipelineConfig-class
      - StageResult-class
  - title: Planned / stub contracts
    desc: >
      Contract generics for stages not yet implemented.
      These are exported so registered strategies can be tested independently.
    contents:
      - assess_fit
      - classify_archetype
      - extract_signature
      - generate
      - interpret
      - recovery_benchmark
      - register_migration
      - landscapeR-package
