on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R-CMD-check

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5"
          use-public-rspm: true

      - name: Install Bioconductor
        run: |
          Rscript -e 'install.packages("BiocManager"); BiocManager::install(version = "3.22", ask = FALSE)'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::devtools
            any::testthat
            any::pkgdown

      - name: Check
        run: rcmdcheck::rcmdcheck(args = c("--no-manual"), error_on = "warning")
        shell: Rscript {0}

      - name: Build pkgdown site
        run: Rscript -e 'pkgdown::build_site()'

      - name: Check pkgdown article images
        run: python3 scripts/check-pkgdown-images.py --site-root _site _site/articles/stage1-evidence.html

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ADR coverage
        run: python3 scripts/check-adr-coverage.py

      - name: Registry compliance
        run: bash scripts/check-registry-compliance.sh

      - name: Visual landing-proof policy tests
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py' -v

      - name: Visual landing-proof policy
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" > /tmp/pr_body.txt
          python3 scripts/check-figure-review.py /tmp/pr_body.txt

  pkgdown:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [R-CMD-check, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5"
          use-public-rspm: true

      - name: Install Bioconductor
        run: |
          Rscript -e 'install.packages("BiocManager"); BiocManager::install(version = "3.22", ask = FALSE)'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown

      - name: Build pkgdown site
        run: Rscript -e 'pkgdown::build_site()'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
